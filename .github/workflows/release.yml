name: Release

# Tag a release to publish, e.g.:  git tag v0.1.0 && git push origin v0.1.0
# Publishes to nuget.org via Trusted Publishing (OIDC) — no stored API key/secret.
# Relies on a Trusted Publisher Policy on nuget.org: owner=saintsystems, repo=BusFire, workflow=release.yml.
on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # required for nuget.org Trusted Publishing (OIDC token exchange)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for SourceLink

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore BusFire.sln

      - name: Test (coverage, fail under 80% line)
        run: dotnet test tests/BusFire.Tests/BusFire.Tests.csproj -c Release --no-restore -p:CollectCoverage=true -p:CoverletOutputFormat=cobertura -p:Include='[BusFire]*' -p:Threshold=80 -p:ThresholdType=line -p:ThresholdStat=total

      # MinVer derives the package version from the pushed `v*` tag — no -p:Version needed.
      - name: Pack
        run: dotnet pack src/BusFire.csproj -c Release --no-restore -p:ContinuousIntegrationBuild=true -o ./artifacts

      # Exchanges the GitHub OIDC token for a short-lived nuget.org API key (no secret stored).
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: saintsystems

      - name: Push to nuget.org
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Turn the tag into a GitHub Release with auto-generated notes and the packages attached.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" ./artifacts/*.nupkg ./artifacts/*.snupkg --title "${{ github.ref_name }}" --generate-notes
