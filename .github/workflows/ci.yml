name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for SourceLink

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore BusFire.sln

      - name: Build
        run: dotnet build BusFire.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test (coverage, fail under 80% line)
        run: dotnet test tests/BusFire.Tests/BusFire.Tests.csproj -c Release --no-restore -p:CollectCoverage=true -p:CoverletOutputFormat=cobertura -p:CoverletOutput=./TestResults/coverage.cobertura.xml -p:Include='[BusFire]*' -p:Threshold=80 -p:ThresholdType=line -p:ThresholdStat=total

      - name: Pack
        run: dotnet pack src/BusFire.csproj -c Release --no-build -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.*nupkg
          if-no-files-found: error
